{% extends "base.html" %}
{% block title %}Delete category — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-8 text-center">
    <h1 class="text-xl font-bold text-slate-900 mb-2">Delete "{{ object.name }}"?</h1>
    <p class="text-sm text-slate-500 mb-6">
        This is only possible if no expenses use this category. This action cannot be undone.
    </p>
    <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Delete</button>
        <a href="{% url 'expenses:category_list' %}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
