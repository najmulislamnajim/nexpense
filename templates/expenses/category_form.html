{% extends "base.html" %}
{% block title %}New category — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">New category</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            {% include "partials/field.html" with field=field %}
        {% endfor %}
        <div class="flex gap-3 pt-2">
            <button type="submit" class="btn-primary flex-1">Save category</button>
            <a href="{% url 'expenses:category_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
