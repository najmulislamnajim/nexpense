{% extends "base.html" %}
{% block title %}Check your email — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-8 mt-8 text-center">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Check your email</h1>
    <p class="text-sm text-slate-500">
        If an account exists with that email, we've sent a link to reset your password.
    </p>
    <a href="{% url 'accounts:login' %}" class="inline-block mt-6 text-emerald-600 font-medium hover:underline">Back to login</a>
</div>
{% endblock %}
