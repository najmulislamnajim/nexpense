{% extends "base.html" %}
{% block title %}Password reset — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto card p-8 mt-8 text-center">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Password updated</h1>
    <p class="text-sm text-slate-500">Your password has been changed successfully.</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary inline-flex mt-6">Log in</a>
</div>
{% endblock %}
