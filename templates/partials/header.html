<header class="bg-white border-b border-slate-200 sticky top-0 z-40" x-data="{ open: false }">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-16">

            <a href="{% if user.is_authenticated %}{% url 'expenses:dashboard' %}{% else %}{% url 'accounts:login' %}{% endif %}"
               class="flex items-center gap-2 shrink-0">
                <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-emerald-600 text-white text-lg font-bold shadow-sm">n</span>
                <span class="text-xl font-bold tracking-tight text-slate-900">{{ SITE_NAME }}</span>
            </a>

            {% if user.is_authenticated %}
            <nav class="hidden md:flex items-center gap-1">
                <a href="{% url 'expenses:dashboard' %}"
                   class="px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'dashboard' %}text-emerald-700 bg-emerald-50{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                    Dashboard
                </a>
                <a href="{% url 'expenses:list' %}"
                   class="px-3 py-2 rounded-lg text-sm font-medium {% if 'expenses' in request.path %}text-emerald-700 bg-emerald-50{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                    Expenses
                </a>
                <a href="{% url 'expenses:category_list' %}"
                   class="px-3 py-2 rounded-lg text-sm font-medium {% if 'categories' in request.path %}text-emerald-700 bg-emerald-50{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                    Categories
                </a>
                <a href="{% url 'reports:report' %}"
                   class="px-3 py-2 rounded-lg text-sm font-medium {% if 'reports' in request.path %}text-emerald-700 bg-emerald-50{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                    Reports
                </a>
            </nav>

            <div class="hidden md:flex items-center gap-3">
                <a href="{% url 'expenses:create' %}" class="btn-primary !py-2 !px-3.5 text-sm">+ Add expense</a>
                <div class="relative" x-data="{ menu: false }">
                    <button @click="menu = !menu" @click.outside="menu = false"
                            class="flex items-center gap-2 rounded-full pl-1 pr-3 py-1 hover:bg-slate-50 border border-transparent hover:border-slate-200">
                        <span class="flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-xs font-semibold text-slate-700">
                            {{ user.get_short_name|slice:":1"|upper }}
                        </span>
                        <span class="text-sm font-medium text-slate-700">{{ user.get_short_name }}</span>
                    </button>
                    <div x-show="menu" x-cloak x-transition
                         class="absolute right-0 mt-2 w-48 rounded-lg border border-slate-200 bg-white shadow-lg py-1">
                        <a href="{% url 'accounts:profile' %}" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Profile</a>
                        <form method="post" action="{% url 'accounts:logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Log out</button>
                        </form>
                    </div>
                </div>
            </div>

            <button @click="open = !open" class="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-50" aria-label="Toggle menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            {% else %}
            <div class="flex items-center gap-2">
                <a href="{% url 'accounts:login' %}" class="btn-secondary !py-2 text-sm">Log in</a>
                <a href="{% url 'accounts:signup' %}" class="btn-primary !py-2 text-sm">Sign up</a>
            </div>
            {% endif %}
        </div>

        {% if user.is_authenticated %}
        <nav x-show="open" x-cloak class="md:hidden pb-4 space-y-1">
            <a href="{% url 'expenses:dashboard' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Dashboard</a>
            <a href="{% url 'expenses:list' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Expenses</a>
            <a href="{% url 'expenses:category_list' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Categories</a>
            <a href="{% url 'reports:report' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Reports</a>
            <a href="{% url 'expenses:create' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-emerald-700">+ Add expense</a>
            <a href="{% url 'accounts:profile' %}" class="block px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Profile</a>
            <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50">Log out</button>
            </form>
        </nav>
        {% endif %}
    </div>
</header>
